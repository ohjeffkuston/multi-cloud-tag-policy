name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: python -m pip install -e .
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Exercise CLI
        run: |
          set +e
          multi-cloud-tag-audit examples/resources.json > audit-report.json
          status=$?
          test "$status" -eq 2
      - name: Upload sample audit report
        uses: actions/upload-artifact@v4
        with:
          name: sample-audit-report
          path: audit-report.json

