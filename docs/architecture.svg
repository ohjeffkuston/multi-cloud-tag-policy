<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Multi-Cloud Tag Policy Auditor architecture</title>
  <desc id="desc">AWS, Azure, and Google Cloud inventories flow through normalization and deterministic policy evaluation to an audit report and human approval queue.</desc>
  <rect width="1400" height="760" fill="#07111f"/>
  <text x="700" y="74" text-anchor="middle" fill="#f8fafc" font-family="Arial, sans-serif" font-size="34" font-weight="700">Multi-Cloud Tag Policy Auditor</text>
  <text x="700" y="112" text-anchor="middle" fill="#94a3b8" font-family="Arial, sans-serif" font-size="18">Read-only evidence • deterministic decisions • human-controlled remediation</text>

  <g font-family="Arial, sans-serif">
    <rect x="70" y="190" width="260" height="290" rx="24" fill="#10243e" stroke="#60a5fa" stroke-width="3"/>
    <text x="200" y="235" text-anchor="middle" fill="#f8fafc" font-size="24" font-weight="700">Cloud inventory</text>
    <rect x="105" y="270" width="190" height="48" rx="12" fill="#172f4d"/>
    <text x="200" y="301" text-anchor="middle" fill="#dbeafe" font-size="20">AWS tags</text>
    <rect x="105" y="336" width="190" height="48" rx="12" fill="#172f4d"/>
    <text x="200" y="367" text-anchor="middle" fill="#dbeafe" font-size="20">Azure tags</text>
    <rect x="105" y="402" width="190" height="48" rx="12" fill="#172f4d"/>
    <text x="200" y="433" text-anchor="middle" fill="#dbeafe" font-size="20">GCP labels</text>

    <rect x="430" y="190" width="260" height="290" rx="24" fill="#10243e" stroke="#2dd4bf" stroke-width="3"/>
    <text x="560" y="235" text-anchor="middle" fill="#f8fafc" font-size="24" font-weight="700">Normalize</text>
    <text x="560" y="298" text-anchor="middle" fill="#ccfbf1" font-size="19">Provider keys</text>
    <text x="560" y="338" text-anchor="middle" fill="#ccfbf1" font-size="19">Required metadata</text>
    <text x="560" y="378" text-anchor="middle" fill="#ccfbf1" font-size="19">Allowed values</text>
    <text x="560" y="418" text-anchor="middle" fill="#ccfbf1" font-size="19">Approved exemptions</text>

    <rect x="790" y="190" width="260" height="290" rx="24" fill="#10243e" stroke="#fbbf24" stroke-width="3"/>
    <text x="920" y="235" text-anchor="middle" fill="#f8fafc" font-size="24" font-weight="700">Policy engine</text>
    <text x="920" y="298" text-anchor="middle" fill="#fef3c7" font-size="19">Stable finding codes</text>
    <text x="920" y="338" text-anchor="middle" fill="#fef3c7" font-size="19">Severity weights</text>
    <text x="920" y="378" text-anchor="middle" fill="#fef3c7" font-size="19">Compliance score</text>
    <text x="920" y="418" text-anchor="middle" fill="#fef3c7" font-size="19">PASS / REVIEW / BLOCK</text>

    <rect x="1150" y="190" width="180" height="290" rx="24" fill="#10243e" stroke="#f472b6" stroke-width="3"/>
    <text x="1240" y="235" text-anchor="middle" fill="#f8fafc" font-size="24" font-weight="700">Outputs</text>
    <text x="1240" y="300" text-anchor="middle" fill="#fce7f3" font-size="18">JSON report</text>
    <text x="1240" y="345" text-anchor="middle" fill="#fce7f3" font-size="18">CI decision</text>
    <text x="1240" y="390" text-anchor="middle" fill="#fce7f3" font-size="18">n8n routing</text>
    <text x="1240" y="435" text-anchor="middle" fill="#fce7f3" font-size="18">Human review</text>

    <g stroke="#64748b" stroke-width="5" fill="#64748b">
      <line x1="330" y1="335" x2="420" y2="335"/><polygon points="430,335 412,324 412,346"/>
      <line x1="690" y1="335" x2="780" y2="335"/><polygon points="790,335 772,324 772,346"/>
      <line x1="1050" y1="335" x2="1140" y2="335"/><polygon points="1150,335 1132,324 1132,346"/>
    </g>

    <rect x="350" y="575" width="700" height="92" rx="22" fill="#0b1d31" stroke="#475569" stroke-width="2"/>
    <text x="700" y="614" text-anchor="middle" fill="#f8fafc" font-size="22" font-weight="700">Safety boundary</text>
    <text x="700" y="649" text-anchor="middle" fill="#94a3b8" font-size="18">No cloud credentials • no network calls • no automatic remediation</text>
  </g>
</svg>

